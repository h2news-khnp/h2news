name: Daily Hydrogen News Crawler

on:
  workflow_dispatch:
  schedule:
    # =========================
    # KST 기준 자동 실행
    # =========================

    # 🔹 매일 뉴스 크롤링
    # KST 08:00 → UTC 23:00 (전날)
    - cron: "0 23 * * *"

    # KST 14:13 → UTC 05:13
    - cron: "13 5 * * *"

    # 🔹 주간 미니 리포트
    # KST 금요일 15:20 → UTC 금요일 06:20
    - cron: "20 6 * * 5"

permissions:
  contents: write

jobs:
  crawler:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 저장소 체크아웃
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Python 세팅
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ 의존성 설치
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      # 4️⃣ 일간 뉴스 크롤러 실행
      - name: Run daily crawler
        run: |
          echo "=================================="
          echo "🕒 실행 시각 (UTC)"
          date -u
          echo "🕒 실행 시각 (KST)"
          TZ=Asia/Seoul date
          echo "=================================="

          python data/crawler/news_crawler.py

      # 5️⃣ 주간 미니 리포트 생성 (금요일 15:20 KST 전용)
      - name: Build weekly mini report
        if: ${{ github.event_name == 'schedule' && github.event.schedule == '20 6 * * 5' }}
        run: |
          echo "📊 주간 트렌드 미니 리포트 생성"
          python data/crawler/make_weekly.py

      # 6️⃣ 변경사항 커밋 & 푸시
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data
          git status

          git commit -m "Auto update (daily news / weekly report)" || echo "No changes to commit"
          git push
